<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier AI Precision - Ultra Realistic Designer</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #030303;
            font-family: 'Inter', sans-serif;
            color: #fff;

        .studio-glass {
            background: rgba(10, 10, 10, 0.6);

            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        #canvas-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
        }

        .loading-bar {
            height: 2px;
            background: linear-gradient(90deg, #6366f1, #a855f7, #6366f1);
            background-size: 200% 100%;
            animation: move-bg 2s linear infinite;
        }

        @keyframes move-bg {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 2px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const apiKey = ""; 

        const SYSTEM_PROMPT = `Sen dünyanın en yetenekli 3D mobilya tasarımcısı ve üretim mühendisisin. 
Görevin, kullanıcının hayalini kurduğu mobilyayı MİKRO-DETAYLI bir şekilde 3D parçalara dökmek. 
Sadece kaba bloklar kullanma; mobilyayı bir profesyonel gibi katmanlara ayır.

Örneğin bir sandalye yapıyorsan:
1. Oturma minderini ana gövde, dikiş payı ve yumuşatılmış kenarlar olarak 3 ayrı parça gibi düşün.
2. Ayakların bağlantı noktalarını, destek çıtalarını ve zemin koruyucularını ekle.
3. Malzeme özelliklerini (metaliklik, vernik, pürüzlülük) her parça için ayrı belirle.

SADECE şu JSON yapısını döndür:
{
  "design_logic": "Tasarımın mühendislik açıklaması",
  "parts": [
    {
      "type": "box" | "cylinder" | "sphere",
      "dimensions": [w, h, d] | [rTop, rBottom, height],
      "position": [x, y, z],
      "rotation": [x, y, z],
      "material": {
        "color": "#hex",
        "metalness": 0.0-1.0,
        "roughness": 0.0-1.0,
        "clearcoat": 0.0-1.0,
        "transmission": 0.0-1.0 (cam/pleksi için)
      },
      "name": "Parça açıklaması (örn: Sol Arka Destek Mili)"
    }
  ]
}

Birimler METRE'dir. 0.01m (1cm) gibi küçük detaylar ekleyerek gerçekçiliği artır.`;

        const App = () => {
            const [prompt, setPrompt] = useState("");
            const [loading, setLoading] = useState(false);
            const [parts, setParts] = useState([]);
            const [logic, setLogic] = useState("Tasarım motoru hazır. Mimari bir komut bekleniyor.");
            const [error, setError] = useState(null);

            const sceneRef = useRef(null);
            const groupRef = useRef(null);
            const rendererRef = useRef(null);

            // --- Three.js Setup ---
            useEffect(() => {
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x020202);
                scene.fog = new THREE.Fog(0x020202, 2, 15);
                sceneRef.current = scene;

                const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(2.5, 1.8, 2.5);

                const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                renderer.outputEncoding = THREE.sRGBEncoding;
                renderer.toneMapping = THREE.ACESFilmicToneMapping;
                document.getElementById('canvas-container').appendChild(renderer.domElement);
                rendererRef.current = renderer;

                const controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.minDistance = 0.5;
                controls.maxDistance = 6;

                // Lighting Rig (Studio Setup)
                const mainLight = new THREE.SpotLight(0xffffff, 1.2);
                mainLight.position.set(5, 8, 5);
                mainLight.castShadow = true;
                mainLight.shadow.mapSize.width = 4096; // High detail shadows
                mainLight.shadow.mapSize.height = 4096;
                scene.add(mainLight);

                const rimLight = new THREE.DirectionalLight(0xffffff, 0.5);
                rimLight.position.set(-5, 2, -5);
                scene.add(rimLight);

                const topLight = new THREE.RectAreaLight(0xffffff, 2, 10, 10);
                topLight.position.set(0, 10, 0);
                topLight.lookAt(0, 0, 0);
                scene.add(topLight);

                const ambient = new THREE.AmbientLight(0xffffff, 0.2);
                scene.add(ambient);

                // Environment (Soft Floor)
                const floorGeo = new THREE.CircleGeometry(10, 64);
                const floorMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.8 });
                const floor = new THREE.Mesh(floorGeo, floorMat);
                floor.rotation.x = -Math.PI / 2;
                floor.receiveShadow = true;
                scene.add(floor);

                const group = new THREE.Group();
                scene.add(group);
                groupRef.current = group;

                const animate = () => {
                    requestAnimationFrame(animate);
                    controls.update();
                    renderer.render(scene, camera);
                };
                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);
                lucide.createIcons();

                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // --- Construction Logic ---
            useEffect(() => {
                if (!groupRef.current) return;
                while(groupRef.current.children.length > 0) {
                    const obj = groupRef.current.children[0];
                    obj.geometry.dispose();
                    obj.material.dispose();
                    groupRef.current.remove(obj);
                }

                parts.forEach(p => {
                    let geo;
                    if (p.type === 'cylinder') geo = new THREE.CylinderGeometry(p.dimensions[0], p.dimensions[1], p.dimensions[2], 48);
                    else if (p.type === 'sphere') geo = new THREE.SphereGeometry(p.dimensions[0], 32, 32);
                    else geo = new THREE.BoxGeometry(...p.dimensions);

                    const mat = new THREE.MeshPhysicalMaterial({ 
                        color: p.material?.color || "#ffffff",
                        metalness: p.material?.metalness || 0,
                        roughness: p.material?.roughness || 0.5,
                        clearcoat: p.material?.clearcoat || 0,
                        transmission: p.material?.transmission || 0,
                        thickness: 0.1,
                        envMapIntensity: 1
                    });
                    
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.set(...p.position);
                    if (p.rotation) mesh.rotation.set(...p.rotation);
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    groupRef.current.add(mesh);
                });
            }, [parts]);

            const generate = async () => {
                if (!prompt || loading) return;
                setLoading(true);
                setError(null);

                const call = async (retries = 0) => {
                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });
                        const data = await res.json();
                        const result = JSON.parse(data.candidates[0].content.parts[0].text);
                        setParts(result.parts || []);
                        setLogic(result.design_logic || "");
                    } catch (e) {
                        if (retries < 3) setTimeout(() => call(retries + 1), 1000);
                        else setError("Mimari analiz başarısız oldu. Lütfen daha detaylı tarif edin.");
                    } finally {
                        setLoading(false);
                        setTimeout(() => lucide.createIcons(), 100);
                    }
                };
                call();
            };

            return (
                <div className="relative w-full h-full pointer-events-none p-8 flex flex-col md:flex-row gap-8">
                    
                    {/* UI Paneli */}
                    <div className="w-full md:w-[380px] flex flex-col gap-6 pointer-events-auto">
                        
                        <div className="studio-glass rounded-[32px] p-8 border-white/10 overflow-hidden relative">
                            {loading && <div className="absolute top-0 left-0 w-full loading-bar"></div>}
                            
                            <div className="flex items-center gap-4 mb-6">
                                <div className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(255,255,255,0.2)]">
                                    <i data-lucide="diamond" className="text-black w-6 h-6"></i>
                                </div>
                                <div>
                                    <h1 className="text-xl font-extrabold tracking-tight">Atelier Precision</h1>
                                    <p className="text-[10px] uppercase tracking-[0.2em] text-white/40 font-bold">Ultra Realistic Studio</p>
                                </div>
                            </div>

                            <div className="flex flex-col gap-5">
                                <div className="space-y-2">
                                    <label className="text-[10px] font-bold text-white/30 uppercase tracking-widest ml-1">Mimari Talimat</label>
                                    <div className="relative">
                                        <textarea 
                                            className="w-full h-36 bg-white/5 border border-white/10 rounded-[20px] p-5 text-sm leading-relaxed focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-all resize-none placeholder:text-white/10"
                                            placeholder="Örn: 4 katmanlı minder yapısına sahip, ceviz ayaklı ve fırçalanmış metal detaylı bir şezlong..."
                                            value={prompt}
                                            onChange={(e) => setPrompt(e.target.value)}
                                        />
                                        <button 
                                            onClick={generate}
                                            disabled={loading || !prompt}
                                            className="absolute bottom-4 right-4 p-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl shadow-xl transition-all disabled:opacity-30 active:scale-95"
                                        >
                                            {loading ? <i data-lucide="refresh-cw" className="w-5 h-5 animate-spin"></i> : <i data-lucide="wand-2" className="w-5 h-5"></i>}
                                        </button>
                                    </div>
                                </div>

                                {error && <div className="p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-400 text-[10px] font-bold text-center uppercase tracking-wider">{error}</div>}
                            </div>
                        </div>

                        {/* Detay Paneli */}
                        <div className="studio-glass rounded-[32px] p-6 flex-1 flex flex-col gap-5 overflow-hidden">
                            <div className="flex items-center justify-between border-b border-white/5 pb-4">
                                <div className="flex items-center gap-3">
                                    <i data-lucide="cpu" className="w-4 h-4 text-indigo-400"></i>
                                    <span className="text-[10px] font-bold text-white/40 uppercase tracking-widest">Mühendislik Analizi</span>
                                </div>
                                <span className="text-[10px] bg-white/5 px-3 py-1 rounded-full text-white/60">{parts.length} Katman</span>
                            </div>

                            <p className="text-[11px] text-white/70 leading-relaxed font-light italic">
                                {loading ? "Analiz ediliyor..." : `"${logic}"`}
                            </p>

                            <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar space-y-3">
                                {parts.map((p, i) => (
                                    <div key={i} className="group p-4 bg-white/[0.03] hover:bg-white/[0.08] border border-white/5 rounded-2xl transition-all flex items-center justify-between">
                                        <div className="flex flex-col gap-1">
                                            <span className="text-[11px] font-semibold text-white/90">{p.name || "Detay Parça"}</span>
                                            <div className="flex gap-2">
                                                <span className="text-[8px] uppercase font-bold text-white/20 tracking-tighter">{p.type}</span>
                                                <span className="text-[8px] uppercase font-bold text-indigo-400/50">Mat: {(1-p.material?.roughness).toFixed(1)} Gloss</span>
                                            </div>
                                        </div>
                                        <div 
                                            className="w-10 h-10 rounded-xl border border-white/10 shadow-lg relative overflow-hidden" 
                                            style={{ backgroundColor: p.material?.color }}
                                        >
                                            <div className="absolute inset-0 bg-gradient-to-tr from-black/20 to-transparent" />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Sağ Alt Navigasyon */}
                    <div className="flex-1 flex flex-col justify-end items-end pb-4 pr-4">
                        <div className="studio-glass px-8 py-4 rounded-[24px] flex gap-8 items-center border-white/5 shadow-2xl">
                             <div className="flex flex-col items-end gap-1">
                                <span className="text-[9px] font-black text-indigo-500 uppercase tracking-[0.3em]">Precision Render</span>
                                <span className="text-xs text-white/80 font-medium">8K Interactive View</span>
                             </div>
                             <div className="w-px h-8 bg-white/10" />
                             <div className="flex gap-4">
                                <button onClick={() => window.location.reload()} className="p-2 hover:bg-white/10 rounded-xl transition-all text-white/50 hover:text-white">
                                    <i data-lucide="rotate-ccw" className="w-5 h-5"></i>
                                </button>
                                <button className="p-2 hover:bg-white/10 rounded-xl transition-all text-white/50 hover:text-white">
                                    <i data-lucide="maximize" className="w-5 h-5"></i>
                                </button>
                             </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
